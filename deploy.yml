name: CI/CD Portfolio

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install HTML validator
        run: |
          sudo apt-get update
          sudo apt-get install -y tidy

      - name: Check HTML
        run: |
          tidy -e index.html

      - name: Deploy message
        run: echo "✅ Code checked and deployed!"
